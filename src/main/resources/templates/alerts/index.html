<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alerts - OpenSeat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container py-5">
    <h1 class="mb-4">Alerts</h1>

    <div class="list-group">
        <div class="list-group-item" th:each="alert : ${alerts}">
            <div class="d-flex justify-content-between align-items-center">
                <strong th:text="${alert.course.courseCode}"></strong>
                <small th:text="${#temporals.format(alert.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
            </div>
            <div class="mt-2" th:text="${alert.message}"></div>
        </div>

        <div class="list-group-item text-center py-4" th:if="${#lists.isEmpty(alerts)}">
            No alerts yet. Add a course to your watchlist, then reopen it from the admin view.
        </div>
    </div>
</div>
</body>
</html>
