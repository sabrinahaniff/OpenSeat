<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Courses - OpenSeat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Courses</h1>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Code</th>
                    <th>Course</th>
                    <th>Seats</th>
                    <th>Status</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="course : ${courses}">
                    <td th:text="${course.courseCode}"></td>
                    <td th:text="${course.courseName}"></td>
                    <td th:text="${course.seatsAvailable}"></td>
                    <td>
                        <span class="badge text-bg-success" th:if="${course.restrictionStatus == 'OPEN'}">OPEN</span>
                        <span class="badge text-bg-warning" th:if="${course.restrictionStatus == 'RESTRICTED'}">RESTRICTED</span>
                        <span class="badge text-bg-danger" th:if="${course.restrictionStatus == 'CLOSED'}">CLOSED</span>
                    </td>
                    <td>
                        <form th:if="${!watchedCourseIds.contains(course.id)}"
                              th:action="@{/courses/{id}/watch(id=${course.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-primary" type="submit">Watch</button>
                        </form>

                        <span th:if="${watchedCourseIds.contains(course.id)}" class="text-success fw-semibold">
                            Already watching
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
