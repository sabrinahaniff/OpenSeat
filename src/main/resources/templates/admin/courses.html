<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Courses - OpenSeat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container py-5">
    <h1 class="mb-4">Admin Course Controls</h1>

    <div class="alert alert-info">
        Use the admin account to update availability. If a watched course transitions from unavailable to open, alerts will be created.
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Code</th>
                    <th>Course</th>
                    <th>Seats</th>
                    <th>Status</th>
                    <th>Update</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="course : ${courses}">
                    <td th:text="${course.courseCode}"></td>
                    <td th:text="${course.courseName}"></td>
                    <td th:text="${course.seatsAvailable}"></td>
                    <td th:text="${course.restrictionStatus}"></td>
                    <td>
                        <form class="row g-2"
                              th:action="@{/admin/courses/{id}/update(id=${course.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="col-md-3">
                                <input class="form-control" type="number" min="0" name="seatsAvailable"
                                       th:value="${course.seatsAvailable}" required>
                            </div>
                            <div class="col-md-4">
                                <select class="form-select" name="restrictionStatus">
                                    <option th:selected="${course.restrictionStatus == 'OPEN'}">OPEN</option>
                                    <option th:selected="${course.restrictionStatus == 'RESTRICTED'}">RESTRICTED</option>
                                    <option th:selected="${course.restrictionStatus == 'CLOSED'}">CLOSED</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-dark" type="submit">Save</button>
                            </div>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
