<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Watchlist - OpenSeat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container py-5">
    <h1 class="mb-4">My Watchlist</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Code</th>
                    <th>Course</th>
                    <th>Seats</th>
                    <th>Status</th>
                    <th>Tracked Since</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${watchlistEntries}">
                    <td th:text="${entry.course.courseCode}"></td>
                    <td th:text="${entry.course.courseName}"></td>
                    <td th:text="${entry.course.seatsAvailable}"></td>
                    <td th:text="${entry.course.restrictionStatus}"></td>
                    <td th:text="${#temporals.format(entry.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <form th:action="@{/watchlist/{id}/remove(id=${entry.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Remove</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(watchlistEntries)}">
                    <td colspan="6" class="text-center py-4">No watched courses yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
